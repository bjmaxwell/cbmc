services:
  - type: web
    name: cbmc-preview
    env: node
    plan: free
    buildCommand: npm install && npx prisma db push --schema prisma/postgres/schema.prisma && npm run db:seed:content && npm run db:seed:admins && npm run build
    startCommand: npm run api
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_PREVIEW_GATE_ENABLED
        value: true
      - key: VITE_PREVIEW_ACCESS_CODES
        value: cbmc-review-2026
      - key: DATABASE_URL
        sync: false
